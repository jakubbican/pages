<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D City Explorer — MapTiler Buildings + CesiumJS</title>
    <script src="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Cesium.js"></script>
    <link href="https://cesium.com/downloads/cesiumjs/releases/1.125/Build/Cesium/Widgets/widgets.css" rel="stylesheet">
    <script src="mvt-decoder.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, #cesiumContainer { width: 100%; height: 100%; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
        .cesium-viewer-bottom, .cesium-viewer .cesium-widget-credits { display: none !important; }

        #hud {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 10;
            background: rgba(10, 15, 30, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 14px 16px;
            color: #cbd5e1;
            font-size: 12px;
            min-width: 260px;
            max-height: calc(100vh - 24px);
            overflow-y: auto;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
        }
        #hud h2 { font-size: 15px; font-weight: 700; color: #fff; margin-bottom: 1px; }
        #hud .sub { font-size: 10px; color: #475569; margin-bottom: 12px; }
        .s { font-size: 9px; text-transform: uppercase; letter-spacing: 0.8px; color: #475569; margin: 8px 0 5px; }
        #hud label { display: flex; align-items: center; gap: 7px; padding: 3px 0; cursor: pointer; }
        #hud label:hover { color: #fff; }
        #hud input[type="checkbox"] { accent-color: #3b82f6; width: 14px; height: 14px; }
        .hr { height: 1px; background: rgba(255,255,255,0.04); margin: 8px 0; }
        #hud button {
            background: rgba(59,130,246,0.1);
            border: 1px solid rgba(59,130,246,0.18);
            color: #93c5fd;
            padding: 4px 9px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 11px;
            font-family: inherit;
            transition: all 0.15s;
            margin: 2px 2px 2px 0;
        }
        #hud button:hover { background: rgba(59,130,246,0.25); color: #fff; }
        #hud select {
            background: rgba(30,41,59,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            color: #e2e8f0;
            padding: 4px 6px;
            border-radius: 5px;
            font-size: 11px;
            font-family: inherit;
            width: 100%;
            margin-top: 3px;
        }
        #stats {
            margin-top: 8px;
            padding: 5px 8px;
            background: rgba(59,130,246,0.06);
            border: 1px solid rgba(59,130,246,0.12);
            border-radius: 5px;
            font-size: 10px;
            color: #94a3b8;
            font-variant-numeric: tabular-nums;
        }
        #stats.ok { background: rgba(34,197,94,0.06); border-color: rgba(34,197,94,0.12); color: #86efac; }
        #stats.loading { background: rgba(234,179,8,0.06); border-color: rgba(234,179,8,0.12); color: #fde047; }
        #badge {
            position: absolute; bottom: 6px; left: 50%; transform: translateX(-50%); z-index: 10;
            background: rgba(10,15,30,0.65); backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.04); border-radius: 6px;
            padding: 4px 12px; color: #475569; font-size: 9px; pointer-events: none;
        }
        #badge a { color: #60a5fa; pointer-events: auto; text-decoration: none; }
    </style>
</head>
<body>
    <div id="cesiumContainer"></div>

    <div id="hud">
        <h2>3D City Explorer</h2>
        <div class="sub">Dynamic MapTiler buildings — anywhere on Earth</div>

        <div class="s">Data</div>
        <label><input type="checkbox" id="chkBuildings" checked> 3D Buildings (dynamic)</label>
        <label><input type="checkbox" id="chkTerrain" checked> Terrain</label>
        <label><input type="checkbox" id="chkSatellite" checked> Satellite</label>
        <label><input type="checkbox" id="chkStreets"> Streets Overlay</label>

        <div class="hr"></div>
        <div class="s">Atmosphere</div>
        <label><input type="checkbox" id="chkAtmo" checked> Atmosphere</label>
        <label><input type="checkbox" id="chkLighting" checked> Sun Lighting</label>
        <label><input type="checkbox" id="chkShadows"> Shadows</label>
        <label><input type="checkbox" id="chkFog" checked> Fog</label>

        <div class="hr"></div>
        <div class="s">Style</div>
        <select id="buildingStyle">
            <option value="realistic">Realistic</option>
            <option value="white">White Model</option>
            <option value="height">Height Heatmap</option>
            <option value="class">By Class</option>
        </select>

        <div class="hr"></div>
        <div class="s">Cities</div>
        <div>
            <button onclick="flyTo('prague')">Prague</button>
            <button onclick="flyTo('london')">London</button>
            <button onclick="flyTo('nyc')">New York</button>
            <button onclick="flyTo('paris')">Paris</button>
            <button onclick="flyTo('tokyo')">Tokyo</button>
            <button onclick="flyTo('barcelona')">Barcelona</button>
            <button onclick="flyTo('dubai')">Dubai</button>
            <button onclick="flyTo('singapore')">Singapore</button>
        </div>

        <div class="hr"></div>
        <div class="s">Time</div>
        <div>
            <button onclick="setTime(6)">Sunrise</button>
            <button onclick="setTime(12)">Noon</button>
            <button onclick="setTime(17)">Golden</button>
            <button onclick="setTime(20)">Sunset</button>
        </div>

        <div id="stats">Initializing...</div>
    </div>

    <div id="badge">
        Buildings: <a href="https://www.maptiler.com" target="_blank">MapTiler</a> PBF &bull;
        <a href="https://cesium.com" target="_blank">CesiumJS</a>
    </div>

    <script type="module">
        const KEY = 'O7xtY7yIse9ZJeQPtLxe';
        Cesium.Ion.defaultAccessToken = undefined;

        const statsEl = document.getElementById('stats');
        function setStat(msg, cls) { statsEl.textContent = msg; statsEl.className = cls || ''; }

        // ============================================================
        // Providers
        // ============================================================
        const terrainResource = new Cesium.Resource({
            url: 'https://api.maptiler.com/tiles/terrain-quantized-mesh-v2/',
            queryParameters: { key: KEY }
        });
        const terrain = await Cesium.CesiumTerrainProvider.fromUrl(terrainResource, {
            requestVertexNormals: true
        });

        const satellite = new Cesium.UrlTemplateImageryProvider({
            url: `https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg?key=${KEY}`,
            maximumLevel: 20, tileWidth: 512, tileHeight: 512
        });

        const streets = new Cesium.UrlTemplateImageryProvider({
            url: `https://api.maptiler.com/maps/streets-v2/256/{z}/{x}/{y}@2x.png?key=${KEY}`,
            maximumLevel: 20, tileWidth: 512, tileHeight: 512
        });

        // ============================================================
        // Viewer
        // ============================================================
        const viewer = new Cesium.Viewer('cesiumContainer', {
            baseLayer: new Cesium.ImageryLayer(satellite),
            terrainProvider: terrain,
            skyAtmosphere: new Cesium.SkyAtmosphere(),
            scene3DOnly: true,
            shadows: false,
            animation: false,
            timeline: false,
            baseLayerPicker: false,
            geocoder: false,
            homeButton: false,
            navigationHelpButton: false,
            sceneModePicker: false,
            selectionIndicator: false,
            infoBox: false,
            fullscreenButton: true,
            requestRenderMode: false,
        });

        const scene = viewer.scene;
        const globe = scene.globe;
        const streetsLayer = viewer.imageryLayers.addImageryProvider(streets);
        streetsLayer.show = false;

        globe.enableLighting = true;
        globe.showGroundAtmosphere = true;
        globe.atmosphereLightIntensity = 10.0;
        globe.atmosphereRayleighCoefficient = new Cesium.Cartesian3(5.5e-6, 13.0e-6, 28.4e-6);
        globe.atmosphereMieCoefficient = new Cesium.Cartesian3(21e-6, 21e-6, 21e-6);
        globe.atmosphereMieAnisotropy = 0.9;
        scene.fog.enabled = true;
        scene.fog.density = 2.0e-4;
        scene.highDynamicRange = true;
        globe.depthTestAgainstTerrain = true;

        // ============================================================
        // Dynamic Building Loader
        // ============================================================
        const TILE_Z = 15;                   // zoom level for buildings
        const MAX_TILES = 16;                // max tiles loaded at once
        const MIN_HEIGHT_CAMERA = 100;       // don't load below 100m
        const MAX_HEIGHT_CAMERA = 8000;      // don't load above 8km
        const DEBOUNCE_MS = 600;

        const tileCache = new Map();         // tileKey -> { entities, features, lastUsed }
        let buildingsEnabled = true;
        let currentStyle = 'realistic';
        let totalBuildings = 0;
        let loadedTileKeys = new Set();
        let debounceTimer = null;

        // Color helpers
        const classColors = {
            residential: '#8B9DC3', commercial: '#E8A87C', industrial: '#95A5A6',
            civic: '#D4A574', education: '#7DCEA0', religious: '#C9A0DC',
            healthcare: '#F1948A', '': '#B0BEC5'
        };

        function getColor(props, style) {
            switch (style) {
                case 'realistic': {
                    if (props.fc) try { return Cesium.Color.fromCssColorString(props.fc).withAlpha(0.9); } catch {}
                    const cc = classColors[props.c] || classColors[''];
                    return Cesium.Color.fromCssColorString(cc).withAlpha(0.85);
                }
                case 'white': return Cesium.Color.WHITE.withAlpha(0.88);
                case 'height': {
                    const t = Math.min(props.h / 60, 1);
                    return Cesium.Color.fromHsl(0.6 - t * 0.6, 0.7, 0.45 + t * 0.15, 0.88);
                }
                case 'class': {
                    const cc = classColors[props.c] || classColors[''];
                    return Cesium.Color.fromCssColorString(cc).withAlpha(0.88);
                }
            }
        }

        function lonToTileX(lon, z) { return Math.floor((lon + 180) / 360 * (1 << z)); }
        function latToTileY(lat, z) {
            const r = lat * Math.PI / 180;
            return Math.floor((1 - Math.log(Math.tan(r) + 1 / Math.cos(r)) / Math.PI) / 2 * (1 << z));
        }

        function tileKey(x, y) { return `${x}_${y}`; }

        async function fetchAndDecodeTile(tx, ty) {
            const key = tileKey(tx, ty);
            if (tileCache.has(key)) {
                tileCache.get(key).lastUsed = Date.now();
                return tileCache.get(key);
            }

            const url = `https://api.maptiler.com/tiles/buildings/${TILE_Z}/${tx}/${ty}.pbf?key=${KEY}`;
            try {
                const resp = await fetch(url);
                if (!resp.ok) return null;
                const buffer = await resp.arrayBuffer();
                const features = MVT.decodeBuildingTile(buffer, tx, ty, TILE_Z);
                const entry = { features, entities: [], lastUsed: Date.now(), rendered: false };
                tileCache.set(key, entry);
                return entry;
            } catch (e) {
                console.warn('Tile fetch failed:', key, e);
                return null;
            }
        }

        function renderTileEntities(entry) {
            if (entry.rendered) return;
            entry.rendered = true;

            for (const f of entry.features) {
                const coords = f.coords[0]; // outer ring
                if (!coords || coords.length < 4) continue;

                const positions = Cesium.Cartesian3.fromDegreesArray(coords.flat());
                const color = getColor(f, currentStyle);

                const entity = viewer.entities.add({
                    show: buildingsEnabled,
                    polygon: {
                        hierarchy: new Cesium.PolygonHierarchy(positions),
                        extrudedHeight: f.h,
                        extrudedHeightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        height: f.hm || 0,
                        heightReference: Cesium.HeightReference.RELATIVE_TO_GROUND,
                        material: color,
                        outline: false,
                        closeTop: true,
                        closeBottom: true
                    }
                });
                entry.entities.push(entity);
            }
        }

        function removeTileEntities(entry) {
            for (const e of entry.entities) {
                viewer.entities.remove(e);
            }
            entry.entities = [];
            entry.rendered = false;
        }

        function getVisibleTiles() {
            // Get camera position
            const cam = viewer.camera;
            const carto = cam.positionCartographic;
            if (!carto) return [];

            const height = carto.height;
            if (height < MIN_HEIGHT_CAMERA || height > MAX_HEIGHT_CAMERA) return [];

            const lon = Cesium.Math.toDegrees(carto.longitude);
            const lat = Cesium.Math.toDegrees(carto.latitude);

            // Calculate visible radius based on camera height
            // Approximate: at 1000m, ~0.01° visible; at 5000m, ~0.05°
            const radiusDeg = Math.min(height / 100000, 0.08);

            const xMin = lonToTileX(lon - radiusDeg, TILE_Z);
            const xMax = lonToTileX(lon + radiusDeg, TILE_Z);
            const yMin = latToTileY(lat + radiusDeg, TILE_Z);
            const yMax = latToTileY(lat - radiusDeg, TILE_Z);

            const tiles = [];
            for (let x = xMin; x <= xMax && tiles.length < MAX_TILES; x++) {
                for (let y = yMin; y <= yMax && tiles.length < MAX_TILES; y++) {
                    tiles.push({ x, y });
                }
            }
            return tiles;
        }

        async function updateBuildings() {
            if (!buildingsEnabled) return;

            const visibleTiles = getVisibleTiles();
            const visibleKeys = new Set(visibleTiles.map(t => tileKey(t.x, t.y)));

            // Remove tiles no longer visible
            for (const key of loadedTileKeys) {
                if (!visibleKeys.has(key) && tileCache.has(key)) {
                    removeTileEntities(tileCache.get(key));
                }
            }

            if (visibleTiles.length === 0) {
                const carto = viewer.camera.positionCartographic;
                const h = carto ? Math.round(carto.height) : 0;
                setStat(h > MAX_HEIGHT_CAMERA
                    ? `Zoom in to load buildings (camera: ${h}m)`
                    : `Camera too low (${h}m)`, '');
                loadedTileKeys = visibleKeys;
                return;
            }

            setStat(`Loading ${visibleTiles.length} tiles...`, 'loading');

            // Fetch new tiles
            const fetchPromises = visibleTiles.map(t => fetchAndDecodeTile(t.x, t.y));
            const results = await Promise.all(fetchPromises);

            // Render
            totalBuildings = 0;
            for (const entry of results) {
                if (entry) {
                    renderTileEntities(entry);
                    totalBuildings += entry.features.length;
                }
            }

            loadedTileKeys = visibleKeys;

            // Evict old tiles from cache
            if (tileCache.size > MAX_TILES * 3) {
                const entries = [...tileCache.entries()].sort((a, b) => a[1].lastUsed - b[1].lastUsed);
                for (let i = 0; i < entries.length - MAX_TILES * 2; i++) {
                    removeTileEntities(entries[i][1]);
                    tileCache.delete(entries[i][0]);
                }
            }

            setStat(`${totalBuildings} buildings · ${visibleTiles.length} tiles · z${TILE_Z}`, 'ok');
        }

        // Debounced camera listener
        function onCameraChange() {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(updateBuildings, DEBOUNCE_MS);
        }

        viewer.camera.changed.addEventListener(onCameraChange);
        viewer.camera.moveEnd.addEventListener(onCameraChange);

        // ============================================================
        // Fly-to Cities
        // ============================================================
        const cities = {
            prague:    { lon: 14.42,   lat: 50.087,  h: 1200, heading: 330, pitch: -22 },
            london:    { lon: -0.118,  lat: 51.508,  h: 1500, heading: 350, pitch: -20 },
            nyc:       { lon: -73.985, lat: 40.748,  h: 1500, heading: 10,  pitch: -22 },
            paris:     { lon: 2.347,   lat: 48.858,  h: 1200, heading: 340, pitch: -20 },
            tokyo:     { lon: 139.767, lat: 35.681,  h: 1500, heading: 350, pitch: -20 },
            barcelona: { lon: 2.175,   lat: 41.387,  h: 1200, heading: 320, pitch: -20 },
            dubai:     { lon: 55.274,  lat: 25.197,  h: 2000, heading: 10,  pitch: -18 },
            singapore: { lon: 103.851, lat: 1.290,   h: 1500, heading: 340, pitch: -20 },
        };

        window.flyTo = function(name) {
            const c = cities[name];
            viewer.camera.flyTo({
                destination: Cesium.Cartesian3.fromDegrees(c.lon, c.lat, c.h),
                orientation: {
                    heading: Cesium.Math.toRadians(c.heading),
                    pitch: Cesium.Math.toRadians(c.pitch),
                    roll: 0
                },
                duration: 3.0,
                easingFunction: Cesium.EasingFunction.CUBIC_IN_OUT
            });
        };

        window.setTime = function(hour) {
            const now = new Date();
            viewer.clock.currentTime = Cesium.JulianDate.fromDate(
                new Date(Date.UTC(now.getFullYear(), now.getMonth(), now.getDate(), hour, 0, 0))
            );
            viewer.clock.shouldAnimate = false;
        };

        // ============================================================
        // Controls
        // ============================================================
        document.getElementById('chkBuildings').addEventListener('change', function () {
            buildingsEnabled = this.checked;
            if (!buildingsEnabled) {
                for (const [, entry] of tileCache) {
                    entry.entities.forEach(e => { e.show = false; });
                }
                setStat('Buildings disabled', '');
            } else {
                for (const [, entry] of tileCache) {
                    entry.entities.forEach(e => { e.show = true; });
                }
                updateBuildings();
            }
        });

        document.getElementById('chkTerrain').addEventListener('change', async function () {
            viewer.terrainProvider = this.checked ? terrain : new Cesium.EllipsoidTerrainProvider();
        });

        document.getElementById('chkSatellite').addEventListener('change', function () {
            viewer.imageryLayers.get(0).show = this.checked;
        });

        document.getElementById('chkStreets').addEventListener('change', function () {
            streetsLayer.show = this.checked;
        });

        document.getElementById('chkAtmo').addEventListener('change', function () {
            scene.skyAtmosphere.show = this.checked;
            globe.showGroundAtmosphere = this.checked;
        });

        document.getElementById('chkLighting').addEventListener('change', function () {
            globe.enableLighting = this.checked;
        });

        document.getElementById('chkShadows').addEventListener('change', function () {
            viewer.shadows = this.checked;
        });

        document.getElementById('chkFog').addEventListener('change', function () {
            scene.fog.enabled = this.checked;
        });

        document.getElementById('buildingStyle').addEventListener('change', function () {
            currentStyle = this.value;
            setStat('Updating style...', 'loading');
            for (const [, entry] of tileCache) {
                for (let i = 0; i < entry.entities.length; i++) {
                    entry.entities[i].polygon.material = getColor(entry.features[i], currentStyle);
                }
            }
            setStat(`Style: ${currentStyle}`, 'ok');
        });

        // ============================================================
        // Initial View — Prague at Noon
        // ============================================================
        setTime(12);
        viewer.camera.setView({
            destination: Cesium.Cartesian3.fromDegrees(14.42, 50.087, 1200),
            orientation: { heading: Cesium.Math.toRadians(330), pitch: Cesium.Math.toRadians(-22), roll: 0 }
        });

        // Trigger initial load
        setTimeout(updateBuildings, 2000);
    </script>
</body>
</html>
